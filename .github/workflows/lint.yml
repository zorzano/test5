name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .
